<!DOCTYPE html>
<html data-theme="nord">
  <head>
    <base target="_top">
    <?!= include('main.css') ?>
  </head>
  <body class="min-h-screen bg-base-200 flex flex-col items-center justify-center p-4 md:p-8">
    <div id="app" class="w-full max-w-xl">
      <div class="card bg-base-100 shadow-xl border border-base-300">
        <div class="card-body p-6 md:p-8">
          
          <h1 class="text-2xl md:text-3xl font-extrabold text-primary flex items-center justify-center gap-2 mb-6">
            すやすやおやすみさん 😪
          </h1>

          <!-- ユーザーフォーム -->
          <div class="space-y-4">
            <div class="form-control w-full">
              <label class="label" for="username">
                <span class="label-text font-bold text-base-content">お休みする人の名前</span>
              </label>
              <input type="text" id="username" class="input input-bordered w-full text-base" placeholder="例: 山田" required autocomplete="name" />
            </div>

            <!-- 全休/時間休の切り替えタブ -->
            <div role="tablist" class="tabs tabs-boxed w-full">
              <input type="radio" id="tab-all-day" name="holiday_type_tabs" role="tab" class="tab font-semibold text-sm" aria-label="全休" checked />
              <input type="radio" id="tab-time-off" name="holiday_type_tabs" role="tab" class="tab font-semibold text-sm" aria-label="時間休" />
            </div>

            <!-- 全休用の入力欄 -->
            <div id="all-day-inputs" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div class="form-control w-full">
                <label class="label" for="startDate">
                  <span class="label-text font-bold text-base-content">開始日</span>
                </label>
                <input type="date" id="startDate" class="input input-bordered w-full text-base" required />
              </div>
              <div class="form-control w-full">
                <label class="label" for="endDate">
                  <span class="label-text font-bold text-base-content">終了日</span>
                </label>
                <input type="date" id="endDate" class="input input-bordered w-full text-base" required />
              </div>
            </div>

            <!-- 時間休用の入力欄 -->
            <div id="time-off-inputs" class="space-y-4 hidden">
              <div class="form-control w-full">
                <label class="label" for="timeOffDate">
                  <span class="label-text font-bold text-base-content">対象日</span>
                </label>
                <input type="date" id="timeOffDate" class="input input-bordered w-full text-base" required />
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="form-control w-full">
                  <label class="label" for="timeOffStartTime">
                    <span class="label-text font-bold text-base-content">開始時間</span>
                  </label>
                  <input type="time" id="timeOffStartTime" class="input input-bordered w-full text-base" required />
                </div>
                <div class="form-control w-full">
                  <label class="label" for="timeOffEndTime">
                    <span class="label-text font-bold text-base-content">終了時間</span>
                  </label>
                  <input type="time" id="timeOffEndTime" class="input input-bordered w-full text-base" required />
                </div>
              </div>
            </div>

            <button id="btn-submit" class="btn btn-primary w-full text-lg mt-4 flex items-center justify-center gap-2">
              <span id="submit-spinner" class="loading loading-spinner hidden"></span>
              <span id="btn-text">😪 お休みを登録</span>
            </button>
          </div>

          <div class="divider my-6"></div>

          <!-- カレンダー管理用のタブ -->
          <div role="tablist" class="tabs tabs-lifted w-full">
            
            <!-- タブ1: 送信先登録済み -->
            <input type="radio" id="tab-registered" name="calendar_tabs" role="tab" class="tab font-semibold" aria-label="送信先登録済み" checked />
            <div role="tabpanel" class="tab-content bg-base-100 border-base-300 rounded-box p-4 md:p-6 min-h-[200px]">
              <ul id="registered-list" class="space-y-2">
                <!-- JSで動的に追加される -->
              </ul>
              <div id="registered-empty" class="text-center py-8 text-base-content/50 hidden">
                登録されたカレンダーはありません
              </div>
            </div>

            <!-- タブ2: 送信先管理 -->
            <input type="radio" id="tab-manage" name="calendar_tabs" role="tab" class="tab font-semibold" aria-label="送信先管理" />
            <div role="tabpanel" class="tab-content bg-base-100 border-base-300 rounded-box p-4 md:p-6 min-h-[200px]">
              <ul id="manage-list" class="space-y-2">
                <!-- JSで動的に追加される -->
              </ul>
              <div id="manage-loading" class="text-center py-8 flex flex-col items-center gap-2 text-base-content/50 hidden">
                <span class="loading loading-spinner loading-md"></span>
                <span>カレンダー読み込み中...</span>
              </div>
            </div>

          </div>

        </div>
      </div>
    </div>
    <?!= include('main.js') ?>
  </body>
</html>
